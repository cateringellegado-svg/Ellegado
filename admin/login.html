<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - El Legado</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co blob:;">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-copper': '#AF7A54',
                        'brand-copper-light': '#D9A78B',
                        'cream': '#FAF9F6',
                        'dark-elegant': '#1A1A1A',
                    },
                    fontFamily: {
                        'serif': ['"Cormorant Garamond"', 'serif'],
                        'sans': ['Montserrat', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .text-gradient {
            background: linear-gradient(to right, #AF7A54, #D9A78B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 1s ease-out; }
    </style>
</head>
<body class="bg-cream min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-8 fade-in">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-brand-copper rounded-full mb-6">
                <span class="font-serif text-3xl text-white font-bold">L</span>
            </div>
            <h1 class="font-serif text-3xl text-dark-elegant mb-2">El Legado</h1>
            <p class="text-slate-500 text-sm tracking-widest uppercase">Panel de Administracion</p>
        </div>

        <div class="bg-white rounded-3xl p-8 shadow-2xl border border-brand-copper/10 fade-in">
            <h2 class="font-serif text-2xl text-dark-elegant mb-6 text-center">Iniciar Sesion</h2>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-xs font-medium text-slate-500 uppercase tracking-wider mb-2">Email</label>
                    <input type="email" id="email" required
                        class="w-full bg-cream border border-brand-copper/20 rounded-lg px-4 py-3 font-sans text-sm focus:outline-none focus:border-brand-copper transition-colors"
                        placeholder="tu@email.com">
                </div>
                
                <div>
                    <label for="password" class="block text-xs font-medium text-slate-500 uppercase tracking-wider mb-2">Contrasena</label>
                    <input type="password" id="password" required
                        class="w-full bg-cream border border-brand-copper/20 rounded-lg px-4 py-3 font-sans text-sm focus:outline-none focus:border-brand-copper transition-colors"
                        placeholder="••••••••">
                </div>

                <button type="submit" id="login-btn"
                    class="w-full bg-brand-copper text-white font-semibold py-3 rounded-lg shadow-lg hover:shadow-brand-copper/30 hover:scale-[1.02] transition-all duration-300 uppercase tracking-widest text-xs">
                    Entrar
                </button>
            </form>

            <div id="error-message" class="mt-4 text-center text-red-500 text-sm hidden"></div>
            <div id="loading-msg" class="mt-4 text-center text-slate-400 text-sm hidden">Conectando...</div>
        </div>

        <p class="text-center text-slate-400 text-xs mt-6">
            &copy; 2026 El Legado - Catering y Eventos
        </p>
    </div>

    <script src="js/config.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var form = document.getElementById('login-form');
            var errorDiv = document.getElementById('error-message');
            var loadingMsg = document.getElementById('loading-msg');
            var loginBtn = document.getElementById('login-btn');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                errorDiv.classList.add('hidden');
                loadingMsg.classList.remove('hidden');
                loginBtn.disabled = true;

                var email = document.getElementById('email').value;
                var password = document.getElementById('password').value;

                try {
                    var client = window.supabaseClient || window.supabase;
                    if (!client) {
                        throw new Error('Supabase no se inicializo. Revisa la conexion.');
                    }
                    if (!client.auth) {
                        throw new Error('Cliente de Supabase invalido. Falta modulo auth.');
                    }

                    var result = await client.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (result.error) throw result.error;

                    window.location.href = 'index.html';
                } catch (error) {
                    console.error('Error de autenticacion:', error);
                    errorDiv.textContent = error.message || 'Error al iniciar sesion';
                    errorDiv.classList.remove('hidden');
                } finally {
                    loadingMsg.classList.add('hidden');
                    loginBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
