<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - El Legado</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-copper': '#AF7A54',
                        'brand-copper-light': '#D9A78B',
                        'cream': '#FAF9F6',
                        'dark-elegant': '#1A1A1A',
                    },
                    fontFamily: {
                        'serif': ['"Cormorant Garamond"', 'serif'],
                        'sans': ['Montserrat', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .text-gradient {
            background: linear-gradient(to right, #AF7A54, #D9A78B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 1s ease-out; }
    </style>
</head>
<body class="bg-cream min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-8 fade-in">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-brand-copper rounded-full mb-6">
                <span class="font-serif text-3xl text-white font-bold">L</span>
            </div>
            <h1 class="font-serif text-3xl text-dark-elegant mb-2">El Legado</h1>
            <p class="text-slate-500 text-sm tracking-widest uppercase">Panel de Administración</p>
        </div>

        <div class="bg-white rounded-3xl p-8 shadow-2xl border border-brand-copper/10 fade-in">
            <h2 class="font-serif text-2xl text-dark-elegant mb-6 text-center">Iniciar Sesión</h2>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="email" class="block text-xs font-medium text-slate-500 uppercase tracking-wider mb-2">Email</label>
                    <input type="email" id="email" required
                        class="w-full bg-cream border border-brand-copper/20 rounded-lg px-4 py-3 font-sans text-sm focus:outline-none focus:border-brand-copper transition-colors"
                        placeholder="tu@email.com">
                </div>
                
                <div>
                    <label for="password" class="block text-xs font-medium text-slate-500 uppercase tracking-wider mb-2">Contraseña</label>
                    <input type="password" id="password" required
                        class="w-full bg-cream border border-brand-copper/20 rounded-lg px-4 py-3 font-sans text-sm focus:outline-none focus:border-brand-copper transition-colors"
                        placeholder="••••••••">
                </div>

                <button type="submit" 
                    class="w-full bg-brand-copper text-white font-semibold py-3 rounded-lg shadow-lg hover:shadow-brand-copper/30 hover:scale-[1.02] transition-all duration-300 uppercase tracking-widest text-xs">
                    Entrar
                </button>
            </form>

            <div id="error-message" class="mt-4 text-center text-red-500 text-sm hidden"></div>
        </div>

        <p class="text-center text-slate-400 text-xs mt-6">
            © 2026 El Legado - Catering y Eventos
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.supabase = supabase;
    </script>
    <script src="js/config.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                window.location.href = 'index.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
